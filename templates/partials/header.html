<header class="site-header">
    <nav class="site-nav" aria-label="Основная навигация">
        <a class="nav-logo" href="/">ES Doc</a>

        <!-- Mobile-only: opens the search bar as a full-width sheet under the header -->
        <button type="button" class="nav-search-toggle" aria-label="Открыть поиск"
                aria-expanded="false" aria-controls="site-search">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </button>

        <!-- Real <form> so search degrades to a navigable target without JS;
             search.js upgrades it to a type-ahead combobox (WAI-ARIA pattern). -->
        <form class="nav-search" id="site-search" role="search" action="/docs/" method="get">
            <div class="nav-search-box">
                <svg class="nav-search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input
                    id="site-search-input"
                    class="nav-search-input"
                    type="search"
                    name="q"
                    placeholder="Найти термин или раздел…"
                    autocomplete="off"
                    spellcheck="false"
                    role="combobox"
                    aria-expanded="false"
                    aria-controls="site-search-results"
                    aria-autocomplete="list"
                    aria-label="Поиск по документации">
                <kbd class="nav-search-kbd" aria-hidden="true">/</kbd>
            </div>
            <ul class="nav-search-results" id="site-search-results" role="listbox"
                aria-label="Результаты поиска" hidden></ul>
            <p class="nav-search-status sr-only" role="status" aria-live="polite"></p>
        </form>

        <ul class="nav-links">
            <li><a href="/docs/"{% if active == 'docs' %} aria-current="page"{% endif %}>Документация</a></li>
            <li><a href="/resources/"{% if active == 'resources' %} aria-current="page"{% endif %}>Ресурсы</a></li>
            <li><a href="/authors"{% if active == 'authors' %} aria-current="page"{% endif %}>Авторы</a></li>
            <li>
                <a href="https://github.com/sovue/es-doc"
                   aria-label="Репозиторий на GitHub">GitHub</a>
            </li>
        </ul>
    </nav>
</header>
