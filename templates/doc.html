{% extends "base.html" %}

{% set page_title = title ~ ' — ES Doc' %}
{% set extra_css = ['/static/css/doc.css'] %}
{% set active = 'docs' %}

{% block content %}
<div class="page">

    <div class="layout">

        <aside class="sidebar">
            <p class="sidebar-title">{{ title }}</p>
            <nav aria-label="Содержание"><ul>
                {{ nav|safe }}
            </ul></nav>
        </aside>

        <main class="content" id="main-content">
            {{ body|safe }}
        </main>

    </div>

    {% include "partials/footer.html" %}

</div>
{% endblock %}
