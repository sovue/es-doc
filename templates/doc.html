<html lang="ru">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{title} — ES Doc</title>
        <link rel="stylesheet" href="/resources/css/main.css">
        <link rel="stylesheet" href="/resources/css/doc.css">
        <link rel="icon" href="/favicon.webp">
    </head>

    <body>

        <!-- Skip link: first focusable element, moves keyboard users past nav -->
        <a href="#main-content" class="skip-link">Перейти к содержимому</a>

        <header class="site-header">
            <nav class="site-nav" aria-label="Основная навигация">
                <a class="nav-logo" href="/">ES Doc</a>
                <ul class="nav-links">
                    <li><a href="/docs/" aria-current="page">Документация</a></li>
                    <li><a href="/authors">Авторы</a></li>
                    <li>
                        <a href="https://github.com/sovue/es-doc"
                           target="_blank"
                           rel="noopener noreferrer"
                           aria-label="Репозиторий на GitHub">GitHub</a>
                    </li>
                </ul>
            </nav>
        </header>

        <div class="layout">

            <aside class="sidebar">
                <h2>{title}</h2>
                <nav aria-label="Содержание"><ul>
                    {nav}
                </ul></nav>
            </aside>

            <main class="content" id="main-content">
                {body}
            </main>

        </div>

        <footer class="site-footer">
            <p>
                <a href="/authors">Авторы</a>
                <a href="https://github.com/sovue/es-doc/issues"
                   target="_blank"
                   rel="noopener noreferrer">Нашли ошибку?</a>
            </p>
        </footer>

    </body>

</html>
